<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineApp</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>🎬 CineApp</h1>
    <div class="header-acciones">
      <div id="info-admin" style="display:none">
        <span id="nombre-admin"></span>
        <button onclick="cerrarSesion()">Cerrar sesión</button>
      </div>
      <button id="btn-login" onclick="abrirLogin()">Admin</button>
    </div>
  </header>

  <!-- MODAL DE LOGIN -->
  <div id="modal-login" class="modal" style="display:none">
    <div class="modal-contenido">
      <h2>Acceso Administrador</h2>
      <input type="email" id="login-email" placeholder="Email">
      <input type="password" id="login-password" placeholder="Contraseña">
      <p id="login-error" class="error" style="display:none">Credenciales inválidas</p>
      <div class="botones-form">
        <button onclick="iniciarSesion()">Ingresar</button>
        <button onclick="cerrarLogin()">Cancelar</button>
      </div>
    </div>
  </div>

  <main>

    <!-- PANEL ADMIN -->
    <section id="panel-admin" style="display:none">
      <div class="formulario">
        <h2 id="form-titulo">Agregar Película</h2>
        <input type="hidden" id="pelicula-id">
        <input type="text" id="titulo" placeholder="Título">
        <input type="text" id="director" placeholder="Director">
        <input type="number" id="anio" placeholder="Año">
        <input type="text" id="genero" placeholder="Género">
        <input type="number" id="precio" placeholder="Precio ($)" step="0.01">
        <div class="botones-form">
          <button id="btn-guardar" onclick="guardarPelicula()">Guardar</button>
          <button id="btn-cancelar" onclick="cancelarEdicion()" style="display:none">Cancelar</button>
        </div>
      </div>

      <div class="listado">
        <h2>Gestión de Películas</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Título</th>
              <th>Director</th>
              <th>Año</th>
              <th>Género</th>
              <th>Precio</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-admin">
          </tbody>
        </table>
      </div>

      <!-- TRANSACCIONES -->
      <div class="listado">
        <h2>Historial de Transacciones</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Cliente</th>
              <th>Película</th>
              <th>Tipo</th>
              <th>Fecha</th>
            </tr>
          </thead>
          <tbody id="tabla-transacciones">
          </tbody>
        </table>
      </div>
    </section>

    <!-- VISTA PÚBLICA -->
    <section id="vista-publica">
      <div class="catalogo-header">
        <h2>🎥 Catálogo de Películas</h2>
      </div>
      <div id="catalogo" class="catalogo">
      </div>
    </section>

  </main>

  <!-- MODAL ALQUILAR/COMPRAR -->
  <div id="modal-transaccion" class="modal" style="display:none">
    <div class="modal-contenido">
      <h2 id="modal-transaccion-titulo">Alquilar Película</h2>
      <p id="modal-pelicula-nombre"></p>
      <input type="hidden" id="transaccion-peliculaId">
      <input type="hidden" id="transaccion-tipo">
      <input type="text" id="transaccion-nombre" placeholder="Tu nombre">
      <p id="transaccion-error" class="error" style="display:none">Ingresá tu nombre</p>
      <div class="botones-form">
        <button onclick="confirmarTransaccion()">Confirmar</button>
        <button onclick="cerrarTransaccion()">Cancelar</button>
      </div>
    </div>
  </div>
<!-- API -->
<script src="api/peliculasApi.js"></script>
<script src="api/authApi.js"></script>
<script src="api/transaccionesApi.js"></script>

<!-- UI -->
<script src="ui/catalogoUI.js"></script>
<script src="ui/adminUI.js"></script>
<script src="ui/modalesUI.js"></script>

<!-- UTILS -->
<script src="utils/storage.js"></script>

<!-- MAIN -->
<script src="main.js"></script>
</body>
</html>
